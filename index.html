<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="/icon.png" />
    <title>keep my money!</title>
    <link rel="stylesheet" href="css/style.css?version=1.0.1" />
    <link rel="stylesheet" href="css/favorite.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3213724030939144"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="topbar">
      <button
        id="menuBtn"
        class="icon-btn"
        type="button"
        aria-label="메뉴 열기"
        style="display: none"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="month-nav">
        <button
          id="prevMonth"
          class="month-arrow"
          type="button"
          aria-label="이전 달"
        >
          ‹
        </button>
        <h1 id="monthLabel"></h1>
        <button
          id="nextMonth"
          class="month-arrow"
          type="button"
          aria-label="다음 달"
        >
          ›
        </button>
      </div>

      <div class="topbar-spacer" aria-hidden="true"></div>
    </header>

    <!-- 초기화 버튼 -->
    <div id="resetWrap">
      <button id="resetBtn">전체 초기화</button>
    </div>

    <main class="container">
      <div class="weekdays">
        <div>일</div>
        <div>월</div>
        <div>화</div>
        <div>수</div>
        <div>목</div>
        <div>금</div>
        <div>토</div>
      </div>
      <div id="grid" class="grid"></div>
    </main>

    <!-- 고정된 지출 내역 영역 -->
    <section id="detail">
      <h2 id="detailDate">날짜를 선택하세요</h2>
      <div id="totalSpent"></div>
      <ul id="expenseList"></ul>
    </section>

    <!-- 하단 고정 입력폼 -->
    <div id="inputForm">
      <button class="fav-btn" id="openFavoritesBtn">
        <span class="icon"
          ><svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <!-- 체크박스 + 체크 -->
            <rect x="3" y="4" width="5" height="5" rx="1.2"></rect>
            <polyline points="4.2,7 5.6,8.4 8.2,5.8"></polyline>
            <!-- 텍스트 라인 -->
            <line x1="11" y1="6.5" x2="21" y2="6.5"></line>

            <rect x="3" y="11" width="5" height="5" rx="1.2"></rect>
            <polyline points="4.2,14 5.6,15.4 8.2,12.8"></polyline>
            <line x1="11" y1="13.5" x2="21" y2="13.5"></line>

            <rect x="3" y="18" width="5" height="5" rx="1.2"></rect>
            <polyline points="4.2,21 5.6,22.4 8.2,19.8"></polyline>
            <line x1="11" y1="20.5" x2="21" y2="20.5"></line>
          </svg>
        </span>
      </button>
      <input type="text" id="newItem" placeholder="항목 (선택)" />
      <input type="number" id="newAmount" placeholder="금액" />
      <button id="addExpenseBtn">추가</button>
    </div>

    <!-- 즐겨찾기 팝업 -->
    <div id="favoritesModal" class="modal">
      <div class="modal-content">
        <span class="close" id="closeFavorites">&times;</span>
        <h3>자주 쓰는 항목</h3>
        <div id="favoriteList"></div>

        <div id="favAddForm">
          <input type="text" id="favItem" placeholder="항목명" />
          <input
            type="number"
            id="favAmount"
            placeholder="금액"
            inputmode="numeric"
          />
          <button id="favAddBtn">+추가</button>
        </div>
      </div>
    </div>
    <!-- 금액 재설정 모달 -->
    <div id="budgetModal" class="modal">
      <div class="modal-content">
        <h3>금액 재설정</h3>
        <p>재설정 범위를 선택해 주세요.</p>
        <div class="btn-group">
          <button id="budgetOnlyBtn">금액만 재설정</button>
          <button id="budgetResetAllBtn">금액 재설정 + 전체 초기화</button>
          <button id="budgetCancelBtn">취소</button>
        </div>
      </div>
    </div>
    <!-- auth overlay: email + password -->
    <div
      id="authOverlay"
      style="display: none; position: fixed; inset: 0; z-index: 9999"
    >
      <div class="auth-container">
        <h2 id="authTitle">Keep my money!</h2>

        <div class="auth-input-group">
          <input
            type="email"
            id="authEmail"
            placeholder="이메일"
            autocomplete="username"
          />
        </div>
        <div class="auth-input-group">
          <input
            type="password"
            id="authPassword"
            placeholder="비밀번호"
            autocomplete="current-password"
          />
        </div>

        <div class="auth-btn-group">
          <button id="loginBtn">로그인</button>
          <button id="signupBtn">회원가입</button>
        </div>

        <p id="authMsg"></p>
      </div>
    </div>

    <div
      id="mainApp"
      style="display: none; height: 100%; flex-direction: column"
    ></div>
    <div id="menuOverlay" class="menu-overlay"></div>

    <aside id="sideMenu" class="side-menu" aria-hidden="true">
      <div class="side-menu-inner">
        <div class="side-menu-top">
          <div class="side-menu-title">메뉴</div>
          <button
            id="closeMenuBtn"
            class="side-close-btn"
            type="button"
            aria-label="메뉴 닫기"
          >
            ×
          </button>
        </div>

        <div class="side-menu-content">
          <!-- 나중에 메뉴 항목 추가 가능 -->
        </div>

        <div class="side-menu-bottom">
          <button id="logoutBtn" type="button">로그아웃</button>
        </div>
      </div>
    </aside>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script src="js/favorite.js"></script>
    <script src="js/jquery-3.7.1.min.js"></script>
  </body>
</html>
